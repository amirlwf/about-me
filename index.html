<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigar | Cyber Hub</title>
    <!-- فاویکون با ایموجی ربات -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    
    <!-- بارگذاری فونت‌ها با preconnect برای عملکرد بهتر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ===== تنظیمات پایه و ریست ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-green: #00ff41;
            --neon-blue: #00d4ff;
            --neon-purple: #b000ff;
            --bg-dark: #0a0a0a;
            --bg-card: rgba(10, 10, 10, 0.85);
            --text-primary: #e0e0e0;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --font-futuristic: 'Orbitron', sans-serif;
            --font-persian: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-mono);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== انیمیشن ماتریکس در پس‌زمینه ===== */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        /* ===== لایه اسکن‌لاین روی صفحه ===== */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 3px
            );
        }

        /* ===== کانتینر اصلی - وسط‌چین عمودی و افقی ===== */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== باکس اصلی محتوا ===== */
        .content-box {
            background: var(--bg-card);
            border: 1px solid var(--neon-green);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            /* گوشه‌های بریده برای استایل سایبرپانک */
            clip-path: polygon(
                0 15px, 15px 0, calc(100% - 15px) 0, 100% 15px,
                100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0 calc(100% - 15px)
            );
        }

        /* افکت درخشش روی باکس */
        .content-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-green), var(--neon-blue), var(--neon-purple), var(--neon-green));
            background-size: 400% 400%;
            z-index: -1;
            clip-path: polygon(
                0 15px, 15px 0, calc(100% - 15px) 0, 100% 15px,
                100% calc(100% - 15px), calc(100% - 15px) 100%, 15px 100%, 0 calc(100% - 15px)
            );
            animation: border-glow 6s ease infinite;
        }

        @keyframes border-glow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ===== عنوان بالای صفحه ===== */
        .header-tag {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--neon-green);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.7;
            text-align: center;
        }

        /* ===== متن اصلی با افکت گلیچ ===== */
        .main-text {
            font-family: var(--font-persian);
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 40px;
            position: relative;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 20px rgba(0, 255, 65, 0.3);
        }

        /* افکت گلیچ */
        .glitch {
            position: relative;
            animation: glitch-skew 4s infinite linear alternate-reverse;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            color: var(--neon-blue);
            animation: glitch-effect 3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            transform: translate(-2px, -1px);
        }

        .glitch::after {
            color: var(--neon-purple);
            animation: glitch-effect 2s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            transform: translate(2px, 1px);
        }

        @keyframes glitch-effect {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            2% { transform: skew(2deg); }
            4% { transform: skew(-1deg); }
            6% { transform: skew(0deg); }
            100% { transform: skew(0deg); }
        }

        /* ===== بخش فرم تماس ===== */
        .contact-section {
            width: 100%;
        }

        .form-label {
            font-family: var(--font-persian);
            font-size: 0.9rem;
            color: var(--neon-green);
            margin-bottom: 10px;
            display: block;
            opacity: 0.8;
        }

        /* ===== تکس‌اریا ===== */
        .message-input {
            width: 100%;
            min-height: 120px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.3);
            color: var(--text-primary);
            font-family: var(--font-persian);
            font-size: 1rem;
            padding: 15px;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
            direction: rtl;
        }

        .message-input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2), inset 0 0 15px rgba(0, 255, 65, 0.05);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ===== دکمه ارسال ===== */
        .submit-btn {
            width: 100%;
            padding: 15px 30px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-family: var(--font-persian);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px));
        }

        .submit-btn:hover {
            background: rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 20px rgba(0, 255, 65, 0.1);
            color: #fff;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* افکت لودینگ روی دکمه */
        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        /* ===== پیام وضعیت (موفقیت/خطا) ===== */
        .status-message {
            margin-top: 20px;
            padding: 15px;
            font-family: var(--font-persian);
            font-size: 1rem;
            text-align: center;
            display: none;
            animation: fade-in 0.3s ease;
        }

        .status-message.success {
            display: block;
            color: var(--neon-green);
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.05);
        }

        .status-message.error {
            display: block;
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
            background: rgba(255, 68, 68, 0.05);
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== خط جداکننده ===== */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
            margin: 30px 0;
            opacity: 0.5;
        }

        /* ===== دکمه لینک تلگرام ===== */
        .telegram-link-btn {
            width: 100%;
            padding: 18px 30px;
            margin-top: 25px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 255, 65, 0.15));
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-persian);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            clip-path: polygon(0 10px, 10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px));
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .telegram-link-btn:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(0, 255, 65, 0.3));
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), inset 0 0 30px rgba(0, 212, 255, 0.1);
            color: #fff;
            text-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.02);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        }

        .telegram-icon {
            font-size: 1.4rem;
        }

        /* ===== فوتر ===== */
        .footer {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 30px;
            text-align: center;
            letter-spacing: 2px;
        }

        /* ===== ریسپانسیو ===== */
        @media (max-width: 768px) {
            .content-box {
                padding: 25px;
                margin: 10px;
            }

            .main-text {
                font-size: 1.4rem;
                margin-bottom: 25px;
            }

            .submit-btn {
                padding: 12px 20px;
                font-size: 1rem;
            }

            .telegram-link-btn {
                padding: 15px 25px;
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .content-box {
                padding: 20px;
            }

            .header-tag {
                font-size: 0.65rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <!-- کانواس برای انیمیشن باران ماتریکس -->
    <canvas id="matrix-canvas"></canvas>
    
    <!-- لایه اسکن‌لاین روی صفحه -->
    <div class="scanlines"></div>

    <!-- کانتینر اصلی -->
    <div class="main-container">
        <div class="content-box">
            <!-- تگ بالای صفحه -->
            <div class="header-tag">// SYSTEM ONLINE</div>

            <!-- متن اصلی با افکت گلیچ -->
            <div class="main-text">
                <span class="glitch" data-text="فعلاً خبری نیست جیگر">فعلاً خبری نیست جیگر</span>
            </div>

            <div class="divider"></div>

            <!-- بخش فرم تماس -->
            <div class="contact-section">
                <label class="form-label" for="user-message">// پیامتو بنویس:</label>
                <textarea 
                    id="user-message" 
                    class="message-input" 
                    placeholder="اینجا بنویس..."
                    maxlength="4000"
                ></textarea>
                
                <!-- ⚠️ آدرس اسکریپت گوگل رو جایگزین YOUR_SCRIPT_URL کن -->
                <button id="send-btn" class="submit-btn" onclick="sendMessage()">
                    🚀 بفرست
                </button>

                <!-- نمایش وضعیت ارسال -->
                <div id="status-msg" class="status-message"></div>
            </div>

            <!-- جداکننده -->
            <div class="divider"></div>

            <!-- دکمه لینک مستقیم تلگرام -->
            <a href="https://t.me/arlwf?text=%D8%B3%D9%84%D8%A7%D9%85+%D8%AC%DB%8C%DA%AF%D8%B1" 
               class="telegram-link-btn" 
               target="_blank" 
               rel="noopener noreferrer">
                <span class="telegram-icon">💬</span>
                تلگرامم پیام بده
            </a>

            <!-- فوتر -->
            <div class="footer">
                &lt;/&gt; ❤ FOR MY DEAR PARIYA 
            </div>
        </div>
    </div>

    <script>
        // ===== تنظیمات =====
        // ⚠️ آدرس اپلیکیشن وب گوگل اپس اسکریپت رو جایگزین کن
        // توکن ربات و آیدی چت داخل اسکریپت گوگل مدیریت می‌شن (امن‌تره)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbycgb_aI6sjWuXAEK7t5VSxRgslmMOH5P6McK9PWJTm0pXY1CnwMkbKm3WCpu09t0c/exec';

        // ===== انیمیشن باران ماتریکس =====
        // این تابع یه افکت سبک ماتریکس روی بک‌گراند اجرا می‌کنه
        function initMatrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // تنظیم سایز کانواس
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // کاراکترهای ماتریکس (ترکیب لاتین، ژاپنی، اعداد)
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%^&*()+{}|:<>?アイウエオカキクケコサシスセソ';
            const charArray = chars.split('');

            const fontSize = 14;
            const columns = Math.floor(canvas.width / fontSize);
            
            // موقعیت عمودی هر ستون
            const drops = new Array(columns).fill(1);

            function drawMatrix() {
                // پس‌زمینه نیمه‌شفاف برای افکت محو شدن
                ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = `${fontSize}px JetBrains Mono`;

                for (let i = 0; i < drops.length; i++) {
                    // کاراکتر تصادفی
                    const char = charArray[Math.floor(Math.random() * charArray.length)];
                    
                    // رنگ سبز با شفافیت متغیر
                    const alpha = Math.random() * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(0, 255, 65, ${alpha})`;
                    
                    ctx.fillText(char, i * fontSize, drops[i] * fontSize);

                    // ریست ستون وقتی به پایین رسید
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            // اجرا با فریم‌ریت کنترل‌شده (هر 50ms = ~20fps)
            setInterval(drawMatrix, 50);
        }

        // ===== ارسال پیام از طریق گوگل اپس اسکریپت =====
        // توکن ربات داخل اسکریپت گوگل ذخیره شده و اینجا قابل مشاهده نیست
        async function sendMessage() {
            const messageInput = document.getElementById('user-message');
            const sendBtn = document.getElementById('send-btn');
            const message = messageInput.value.trim();

            // بررسی خالی نبودن پیام
            if (!message) {
                showStatus('لطفاً یه پیام بنویس!', 'error');
                return;
            }

            // بررسی تنظیم بودن آدرس اسکریپت
            if (SCRIPT_URL === 'YOUR_SCRIPT_URL') {
                showStatus('⚠️ آدرس اسکریپت تنظیم نشده! فایل HTML رو ویرایش کن.', 'error');
                return;
            }

            // نمایش حالت لودینگ
            sendBtn.classList.add('loading');
            sendBtn.textContent = '⏳ در حال ارسال...';

            try {
                // ارسال درخواست به گوگل اپس اسکریپت
                // توجه: از no-cors استفاده می‌کنیم چون فایل مستقیماً از روی سیستم باز شده
                // این کار اجازه می‌ده درخواست بره و پردازش بشه، ولی نمی‌تونیم پاسخ رو بخونیم
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // اضافه کردن no-cors برای فایل‌های محلی
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                // چون از no-cors استفاده می‌کنیم، response همیشه opaque هست
                // و نمی‌تونیم محتوای اون رو بخونیم
                // اما درخواست به سمت سرور رفته و پردازش شده
                // فرض می‌کنیم ارسال موفق بوده (تلگرام پیام رو دریافت کرده)
                showStatus('پیامت رسید جیگر 😎', 'success');
                messageInput.value = ''; // پاک کردن فیلد

            } catch (error) {
                // خطای شبکه (مثلاً قطعی اینترنت)
                showStatus('خطا در اتصال! اینترنتت رو چک کن.', 'error');
                console.error('Script Error:', error);
            } finally {
                // برداشتن حالت لودینگ
                sendBtn.classList.remove('loading');
                sendBtn.textContent = '🚀 بفرست';
            }
        }

        // ===== نمایش پیام وضعیت =====
        function showStatus(text, type) {
            const statusMsg = document.getElementById('status-msg');
            statusMsg.textContent = text;
            statusMsg.className = `status-message ${type}`;
            
            // مخفی کردن خودکار بعد از 5 ثانیه
            setTimeout(() => {
                statusMsg.className = 'status-message';
            }, 5000);
        }

        // ===== ارسال با کلید Enter =====
        document.getElementById('user-message').addEventListener('keydown', function(e) {
            // Ctrl+Enter یا Cmd+Enter برای ارسال
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendMessage();
            }
        });

        // ===== شروع انیمیشن ماتریکس بعد از لود صفحه =====
        window.addEventListener('load', initMatrixRain);
    </script>
</body>
</html>
